kind = "web"
previewPath = "/"
title = "Visual Neural Network Sandbox"
version = "1.0.0"
id = "artifacts/nn-sandbox"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25858

[services.development]
run = "pnpm --filter @workspace/nn-sandbox run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/nn-sandbox", "run", "build" ]
publicDir = "artifacts/nn-sandbox/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25858"
BASE_PATH = "/"
